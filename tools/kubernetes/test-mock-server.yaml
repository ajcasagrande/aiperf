# Lightweight mock OpenAI-compatible server for testing AIPerf K8s deployment
apiVersion: v1
kind: Service
metadata:
  name: mock-llm-service
  namespace: default
spec:
  selector:
    app: mock-llm
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      name: http
---
apiVersion: v1
kind: Pod
metadata:
  name: mock-llm
  namespace: default
  labels:
    app: mock-llm
spec:
  containers:
    - name: mock-server
      image: python:3.10-slim
      command:
        - python
        - -c
        - |
          from http.server import BaseHTTPRequestHandler, HTTPServer
          import json
          import time

          class MockHandler(BaseHTTPRequestHandler):
              def do_POST(self):
                  if '/v1/chat/completions' in self.path:
                      content_length = int(self.headers['Content-Length'])
                      body = self.rfile.read(content_length)

                      # Parse request
                      try:
                          req = json.loads(body)
                          stream = req.get('stream', False)
                      except:
                          stream = False

                      if stream:
                          # Streaming response
                          self.send_response(200)
                          self.send_header('Content-Type', 'text/event-stream')
                          self.end_headers()

                          # Send chunks
                          for i in range(5):
                              chunk = {
                                  'id': 'chatcmpl-test',
                                  'object': 'chat.completion.chunk',
                                  'created': int(time.time()),
                                  'model': 'mock-model',
                                  'choices': [{
                                      'index': 0,
                                      'delta': {'content': f'token{i} '},
                                      'finish_reason': None if i < 4 else 'stop'
                                  }]
                              }
                              data = f"data: {json.dumps(chunk)}\n\n"
                              self.wfile.write(data.encode())
                              self.wfile.flush()
                              time.sleep(0.01)

                          self.wfile.write(b"data: [DONE]\n\n")
                      else:
                          # Non-streaming response
                          response = {
                              'id': 'chatcmpl-test',
                              'object': 'chat.completion',
                              'created': int(time.time()),
                              'model': 'mock-model',
                              'choices': [{
                                  'index': 0,
                                  'message': {
                                      'role': 'assistant',
                                      'content': 'This is a mock response for testing.'
                                  },
                                  'finish_reason': 'stop'
                              }],
                              'usage': {
                                  'prompt_tokens': 10,
                                  'completion_tokens': 8,
                                  'total_tokens': 18
                              }
                          }

                          self.send_response(200)
                          self.send_header('Content-Type', 'application/json')
                          self.end_headers()
                          self.wfile.write(json.dumps(response).encode())

                  elif '/v1/models' in self.path:
                      response = {
                          'object': 'list',
                          'data': [{'id': 'mock-model', 'object': 'model'}]
                      }
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      self.end_headers()
                      self.wfile.write(json.dumps(response).encode())
                  else:
                      self.send_error(404)

              def do_GET(self):
                  if '/health' in self.path or '/v1/models' in self.path:
                      response = {'status': 'ok'}
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      self.end_headers()
                      self.wfile.write(json.dumps(response).encode())
                  else:
                      self.send_error(404)

          print('Starting mock LLM server on port 8000...')
          server = HTTPServer(('0.0.0.0', 8000), MockHandler)
          server.serve_forever()
      ports:
        - containerPort: 8000
      readinessProbe:
        httpGet:
          path: /health
          port: 8000
        initialDelaySeconds: 5
        periodSeconds: 5
      livenessProbe:
        httpGet:
          path: /health
          port: 8000
        initialDelaySeconds: 10
        periodSeconds: 10
