    <!DOCTYPE html>
    <html>
    <head>
        <title>LLM Performance Dashboard</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                margin: 0;
                padding: 20px;
                background-color: #1a1a1a;
                color: #ffffff;
            }
            .header {
                text-align: center;
                padding: 20px;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                border-radius: 10px;
                margin-bottom: 30px;
            }
            h1 {
                margin: 0;
                font-size: 2.5em;
            }
            .subtitle {
                margin-top: 10px;
                font-size: 1.2em;
                opacity: 0.9;
            }
            .container {
                max-width: 1400px;
                margin: 0 auto;
            }
            .viz-section {
                margin-bottom: 40px;
                background-color: #2c2c2c;
                padding: 20px;
                border-radius: 10px;
                box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            }
            iframe {
                width: 100%;
                border: none;
                background-color: #1a1a1a;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <h1>🚀 LLM Performance Analytics Dashboard</h1>
                <div class="subtitle">Real-time Performance Metrics & Analysis</div>
            </div>

            <div class="viz-section">
                <h2>Performance Summary</h2>
                <iframe src="summary_stats.html" height="300px"></iframe>
            </div>

            <div class="viz-section">
                <h2>Latency Distribution Analysis</h2>
                <iframe src="latency_distribution.html" height="850px"></iframe>
            </div>

            <div class="viz-section">
                <h2>Performance Trends Over Time</h2>
                <iframe src="performance_over_time.html" height="950px"></iframe>
            </div>

            <div class="viz-section">
                <h2>Aggregate System Throughput (Computed)</h2>
                <iframe src="aggregate_throughput.html" height="850px"></iframe>
            </div>

            <div class="viz-section">
                <h2>Token Impact on Performance</h2>
                <iframe src="token_analysis.html" height="550px"></iframe>
            </div>

            <div class="viz-section">
                <h2>Percentile Analysis</h2>
                <iframe src="percentile_analysis.html" height="550px"></iframe>
            </div>

            <div class="viz-section">
                <h2>Metric Correlations</h2>
                <iframe src="correlation_heatmap.html" height="650px"></iframe>
            </div>

            <div class="viz-section">
                <h2>Error Analysis</h2>
                <iframe src="error_analysis.html" height="450px"></iframe>
            </div>

        </div>
    </body>
    </html>
