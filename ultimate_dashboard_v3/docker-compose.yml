version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aiperf-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./backend:/app
    environment:
      - ENVIRONMENT=production
      - API_HOST=0.0.0.0
      - API_PORT=8000
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - aiperf-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aiperf-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_ENABLE_3D=true
      - NEXT_PUBLIC_ENABLE_REALTIME=true
    depends_on:
      - backend
    networks:
      - aiperf-network

networks:
  aiperf-network:
    driver: bridge

volumes:
  data:
