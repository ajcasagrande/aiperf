apiVersion: v1
kind: Namespace
metadata:
  name: aiperf-test
---
apiVersion: v1
kind: Pod
metadata:
  name: mock-server
  namespace: aiperf-test
  labels:
    app: mock-server
spec:
  containers:
  - name: mock-server
    image: aiperf:latest
    imagePullPolicy: IfNotPresent
    command: ["/opt/aiperf/venv/bin/aiperf-mock-server"]
    args: ["-m", "openai/gpt-oss-20b", "--host", "0.0.0.0", "--port", "8000"]
    env:
    - name: MOCK_SERVER_PORT
      value: "8000"
    - name: MOCK_SERVER_HOST
      value: "0.0.0.0"
  restartPolicy: Never
---
apiVersion: v1
kind: Service
metadata:
  name: mock-server
  namespace: aiperf-test
spec:
  selector:
    app: mock-server
  ports:
  - port: 8000
    targetPort: 8000
