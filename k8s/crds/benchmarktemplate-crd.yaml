apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: benchmarktemplates.aiperf.nvidia.com
  annotations:
    controller-gen.kubebuilder.io/version: v0.13.0
spec:
  group: aiperf.nvidia.com
  names:
    kind: BenchmarkTemplate
    listKind: BenchmarkTemplateList
    plural: benchmarktemplates
    singular: benchmarktemplate
    shortNames:
    - bt
    - template
    categories:
    - aiperf
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    additionalPrinterColumns:
    - name: Model
      type: string
      description: Default model for this template
      jsonPath: .spec.defaults.model
    - name: Concurrency
      type: integer
      description: Default concurrency level
      jsonPath: .spec.defaults.workload.concurrency
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
    schema:
      openAPIV3Schema:
        description: BenchmarkTemplate defines a reusable template for benchmark runs
        type: object
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation
              of an object.'
            type: string
          kind:
            description: 'Kind is a string value representing the REST resource this
              object represents.'
            type: string
          metadata:
            type: object
          spec:
            description: BenchmarkTemplateSpec defines the template specification
            type: object
            properties:
              description:
                description: Human-readable description of the template
                type: string
                maxLength: 1024
              defaults:
                description: Default values for benchmark runs created from this template
                type: object
                properties:
                  model:
                    description: Default model to benchmark
                    type: string
                  endpoint:
                    description: Default endpoint configuration
                    type: object
                    properties:
                      url:
                        type: string
                        format: uri
                      type:
                        type: string
                        enum: ["chat", "completions", "embeddings"]
                      authentication:
                        type: object
                        properties:
                          type:
                            type: string
                            enum: ["none", "api-key", "bearer-token", "oauth"]
                          secretRef:
                            type: object
                            properties:
                              name:
                                type: string
                              key:
                                type: string
                  workload:
                    description: Default workload configuration
                    type: object
                    properties:
                      concurrency:
                        type: integer
                        minimum: 1
                        maximum: 10000
                      requestCount:
                        type: integer
                        minimum: 1
                        maximum: 1000000
                      duration:
                        type: string
                      requestRate:
                        type: number
                        minimum: 0.1
                      streaming:
                        type: boolean
                  input:
                    description: Default input configuration
                    type: object
                    properties:
                      type:
                        type: string
                        enum: ["synthetic", "dataset", "custom"]
                      synthetic:
                        type: object
                        properties:
                          promptLength:
                            type: object
                            properties:
                              min:
                                type: integer
                              max:
                                type: integer
                          outputLength:
                            type: object
                            properties:
                              min:
                                type: integer
                              max:
                                type: integer
                      dataset:
                        type: object
                        properties:
                          source:
                            type: string
                          name:
                            type: string
                          split:
                            type: string
                          sampleSize:
                            type: integer
                  resources:
                    description: Default resource configuration
                    type: object
                    properties:
                      workers:
                        type: object
                        properties:
                          min:
                            type: integer
                          max:
                            type: integer
                          cpu:
                            type: string
                          memory:
                            type: string
                          nodeSelector:
                            type: object
                            additionalProperties:
                              type: string
                          tolerations:
                            type: array
                            items:
                              type: object
              constraints:
                description: Constraints and validation rules for benchmark runs
                type: object
                properties:
                  allowedModels:
                    description: List of allowed model names (regex patterns supported)
                    type: array
                    items:
                      type: string
                  maxConcurrency:
                    description: Maximum allowed concurrency
                    type: integer
                    minimum: 1
                  maxDuration:
                    description: Maximum allowed duration
                    type: string
                    pattern: '^([0-9]+(\.[0-9]+)?(ns|us|µs|ms|s|m|h))+$'
                  maxWorkers:
                    description: Maximum number of workers
                    type: integer
                    minimum: 1
                  requiredLabels:
                    description: Labels that must be present on benchmark runs
                    type: object
                    additionalProperties:
                      type: string
                  resourceLimits:
                    description: Resource limits per worker
                    type: object
                    properties:
                      cpu:
                        type: string
                      memory:
                        type: string
              variants:
                description: Named variants of the template with different configurations
                type: object
                additionalProperties:
                  description: Variant configuration
                  type: object
                  properties:
                    description:
                      type: string
                    overrides:
                      description: Configuration overrides for this variant
                      type: object
                      properties:
                        model:
                          type: string
                        workload:
                          type: object
                          properties:
                            concurrency:
                              type: integer
                            requestCount:
                              type: integer
                            duration:
                              type: string
                            requestRate:
                              type: number
                        resources:
                          type: object
                          properties:
                            workers:
                              type: object
                              properties:
                                min:
                                  type: integer
                                max:
                                  type: integer
                                cpu:
                                  type: string
                                memory:
                                  type: string
          status:
            description: BenchmarkTemplateStatus defines the observed state
            type: object
            properties:
              usage:
                description: Usage statistics for this template
                type: object
                properties:
                  totalRuns:
                    description: Total number of benchmark runs created from this template
                    type: integer
                  activeRuns:
                    description: Number of currently active runs
                    type: integer
                  lastUsed:
                    description: Timestamp of last usage
                    type: string
                    format: date-time
              validation:
                description: Template validation status
                type: object
                properties:
                  valid:
                    description: Whether the template is valid
                    type: boolean
                  errors:
                    description: Validation error messages
                    type: array
                    items:
                      type: string
                  lastChecked:
                    description: Last validation check timestamp
                    type: string
                    format: date-time
    subresources:
      status: {}
