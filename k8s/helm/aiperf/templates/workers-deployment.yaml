{{- if .Values.workers.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aiperf.fullname" . }}-workers
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aiperf.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.workers.replicaCount }}
  selector:
    matchLabels:
      {{- include "aiperf.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.workers.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "aiperf.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
        monitoring: enabled
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "aiperf.serviceAccountName" . }}-worker
      securityContext:
        {{- toYaml .Values.security.podSecurityContext | nindent 8 }}
      containers:
        - name: worker
          securityContext:
            {{- toYaml .Values.security.securityContext | nindent 12 }}
          image: "{{ .Values.aiperf.image.registry }}/{{ .Values.aiperf.image.repository }}:{{ .Values.aiperf.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.aiperf.image.pullPolicy }}
          command:
            - "aiperf"
            - "service"
          args:
            - "--service-type"
            - "worker"
          env:
            - name: AIPERF_SERVICE_RUN_TYPE
              value: "kubernetes"
            - name: AIPERF_ZMQ_TCP_HOST
              value: "{{ include "aiperf.fullname" . }}-zmq-proxy"
            - name: AIPERF_LOG_LEVEL
              value: {{ .Values.logging.logLevels.workers | quote }}
            {{- if .Values.config.secrets.modelCredentials.enabled }}
            - name: TARGET_MODEL_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ include "aiperf.fullname" . }}-model-credentials
                  key: endpoint-url
            - name: MODEL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "aiperf.fullname" . }}-model-credentials
                  key: api-key
            {{- end }}
            - name: KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.workers.resources | nindent 12 }}
          volumeMounts:
            - name: config-volume
              mountPath: /app/config
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/cache
      volumes:
        - name: config-volume
          configMap:
            name: {{ include "aiperf.fullname" . }}-config
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
      {{- with .Values.workers.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workers.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workers.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
