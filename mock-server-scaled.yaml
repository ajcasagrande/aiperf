apiVersion: v1
kind: Namespace
metadata:
  name: aiperf-test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-server
  namespace: aiperf-test
spec:
  replicas: 10
  selector:
    matchLabels:
      app: mock-server
  template:
    metadata:
      labels:
        app: mock-server
    spec:
      containers:
      - name: mock-server
        image: aiperf:latest
        imagePullPolicy: IfNotPresent
        command: ["/opt/aiperf/venv/bin/aiperf-mock-server"]
        args: ["-m", "openai/gpt-oss-20b", "--host", "0.0.0.0", "--port", "8000"]
        env:
        - name: MOCK_SERVER_PORT
          value: "8000"
        - name: MOCK_SERVER_HOST
          value: "0.0.0.0"
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: mock-server
  namespace: aiperf-test
spec:
  selector:
    app: mock-server
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
